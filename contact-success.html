<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="Flowtimation" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowtimation — Message Sent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #0F0A14; color: white; min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 3rem; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
  .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-brand-icon { width: 34px; height: 34px; object-fit: contain; mix-blend-mode: screen; }
  .nav-logo { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; background: linear-gradient(135deg, #C22AFF, #71C8B4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 2rem; }
  .card { max-width: 500px; width: 100%; text-align: center; }
  .icon-wrap { width: 72px; height: 72px; border-radius: 50%; background: rgba(194,42,255,0.12); border: 1.5px solid rgba(194,42,255,0.25); display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; }
  .icon-wrap svg { width: 32px; height: 32px; }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #71C8B4; margin-bottom: 1rem; }
  h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 30px; font-weight: 800; letter-spacing: -0.02em; color: white; margin-bottom: 1rem; line-height: 1.2; }
  .grad { background: linear-gradient(135deg, #C22AFF, #71C8B4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  p { font-size: 15px; color: rgba(255,255,255,0.5); line-height: 1.75; margin-bottom: 2rem; }
  .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 0.5rem; }
  .btn { display: inline-block; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; padding: 12px 28px; border-radius: 10px; background: #8C3293; color: white; text-decoration: none; }
  .btn:hover { background: #A03AA6; }
  .btn-ghost { background: transparent; border: 1.5px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.65); }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.4); color: white; background: transparent; }
  @media (max-width: 480px) { .nav { padding: 1rem 1.5rem; } h1 { font-size: 24px; } .links { flex-direction: column; } .btn, .btn-ghost { text-align: center; } }
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-brand">
    <img class="nav-brand-icon" src="logo.png" alt="Flowtimation">
    <div class="nav-logo">Flowtimation</div>
  </a>
</nav>
<div class="main">
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 32 32" fill="none"><rect x="2" y="6" width="28" height="20" rx="2" stroke="#C22AFF" stroke-width="1.5"/><path d="M2 10l14 9 14-9" stroke="#C22AFF" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
    <div class="eyebrow">Message sent</div>
    <h1>Thanks for<br><span class="grad">reaching out.</span></h1>
    <p>Your message has been received. We'll get back to you within <strong style="color:rgba(255,255,255,0.8);">2 business days</strong>. If you have a more specific question about working together, the apply form gives us the context to respond more helpfully.</p>
    <div class="links">
      <a href="apply.html" class="btn">Apply to work together</a>
      <a href="/" class="btn btn-ghost">Back to home</a>
    </div>
  </div>
</div>
</body>
</html>
